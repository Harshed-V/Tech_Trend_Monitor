<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Trend Monitor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='assets/favicon.png') }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='assets/favicon.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="sidebar-collapsed">
    <script>
        (function () {
            try {
                var storedTheme = localStorage.getItem("ttm-theme");
                if (storedTheme !== "light") {
                    document.body.classList.add("dark-mode");
                }
            } catch (error) {
                document.body.classList.add("dark-mode");
            }
        })();
    </script>
    
    <nav class="sidebar" id="sidebar" aria-label="Primary navigation">
        <div class="sidebar-logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <line x1="4" y1="20" x2="10" y2="4"></line>
                <line x1="10" y1="20" x2="16" y2="4"></line>
                <line x1="16" y1="20" x2="22" y2="4"></line>
            </svg>
            <span>Monitor</span>
        </div>
        <a href="/" class="nav-link">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            Home
        </a>
        <a href="/analytics" class="nav-link">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
            Analytics
        </a>
        <a href="/events" class="nav-link">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
            Events
        </a>
        <a href="/reports" class="nav-link">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
            Reports
        </a>
    </nav>
    <button class="mobile-nav-overlay" id="mobile-nav-overlay" type="button" aria-label="Close menu"></button>
    
    <div class="main-content">
        <!-- Topbar & Ticker -->
        <header class="topbar-header">
            <div class="topbar-inner">
            <div class="topbar-status font-mono text-[11px] uppercase tracking-widest text-muted">
                <button class="topbar-menu-btn" id="menu-toggle-btn" type="button" onclick="toggleMenu()" title="Toggle navigation" aria-label="Toggle navigation menu" aria-controls="sidebar" aria-expanded="false">
                    <span class="topbar-menu-text">Menu</span>
                    <span class="hamburger-icon" aria-hidden="true">
                        <span class="hamburger-line"></span>
                        <span class="hamburger-line"></span>
                        <span class="hamburger-line"></span>
                    </span>
                </button>
                <div class="topbar-network">
                    <span id="network-status-dot" class="pulse-dot network-status-dot network-status-online" aria-hidden="true"></span>
                    <span id="network-status-text" class="network-status-text" aria-live="polite">Signal feed live</span>
                </div>
            </div>
            <div class="toggle-container">
                <input type="checkbox" id="toggle" checked />
                <label for="toggle" class="toggle-label">
                    <span class="toggle-ball"></span>
                </label>
            </div>
        </div>

        <!-- Ticker -->
        <div class="ticker-shell" data-ticker data-ticker-speed="92" aria-label="Trending technology signals">
            <div class="ticker-viewport">
                <div class="ticker-track animate-ticker font-mono text-[11px] uppercase tracking-wider text-muted" data-ticker-track>
                    <div class="ticker-group" data-ticker-group role="list">
                        <span class="ticker-item" role="listitem"><span class="ticker-dot"></span>GitHub stars +18% w/w</span>
                        <span class="ticker-item" role="listitem"><span class="ticker-dot"></span>AI / ML reclaims #1 topic</span>
                        <span class="ticker-item" role="listitem"><span class="ticker-dot"></span>Edge runtimes accelerating</span>
                        <span class="ticker-item" role="listitem"><span class="ticker-dot"></span>WebGL renaissance continues</span>
                        <span class="ticker-item" role="listitem"><span class="ticker-dot"></span>Rust crates trending up</span>
                    </div>
                </div>
            </div>
        </div>
        </header>

        <main>
            {% block content %}{% endblock %}
        </main>
    </div>
    
    {% block scripts %}{% endblock %}
<script src="{{ url_for('static', filename='js/main.js') }}" defer></script>
</body>

</html>
